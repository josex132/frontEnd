<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <meta charset="UTF-8">
    <title>SportStock - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
    <img src="logo.jpg" alt="Logo SportStock" style="width: 120px; height: 120px; object-fit: contain; margin-bottom: 10px;">
    <h1>SportStock</h1>
    <p style="color: var(--dark-green); font-weight: bold; margin-bottom: 20px;">Sistema de Gestión de Inventario Deportivo</p>
    <div style="border: 2px solid var(--primary-green); padding: 40px; border-radius: 30px; width: 350px;">
        <h3>Iniciar Sesión</h3>
        <form action="dashboard.html">
            <label style="display:block; font-weight:bold; color: var(--dark-green);">Correo</label>
            <input type="email" placeholder="Usuario@ejemplo.com" required style="width:100%; padding:12px; border-radius:10px; border:none; background:var(--light-green); margin-bottom:15px; box-sizing:border-box;">
            <label style="display:block; font-weight:bold; color: var(--dark-green);">Contraseña</label>
            <input type="password" placeholder="********" required style="width:100%; padding:12px; border-radius:10px; border:none; background:var(--light-green); margin-bottom:20px; box-sizing:border-box;">
            <button type="submit" style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--primary-green); color:white; font-weight:bold; cursor:pointer;"> iniciar sesión</button>
    </div>
    <button type="recover" style=" width:100%; padding: 12px; border-radius:12px; border:none; background:var(--ligth-green);color: black; font-weight:bold; cursor:pointer;"> ¿recuperar contraseña?</button>
        </form>
</body>
</html>
